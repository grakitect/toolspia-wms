<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>간이 재고관리</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h1>WMS</h1>
        <button data-view="dashboard">대시보드</button>
        <button data-view="master">기본 정보</button>
        <button data-view="products">기본상품정보</button>
        <button data-view="stock">재고현황</button>
        <button data-view="inbound">입고</button>
        <button data-view="outbound">출고</button>
        <button data-view="adjust">재고 조정 / 이동</button>
        <button data-view="history">입출고이력</button>
        <button data-view="alert">알림</button>
      </aside>

      <main class="main">
        <section id="view-dashboard" class="view"></section>
        <section id="view-master" class="view hidden"></section>
        <section id="view-products" class="view hidden"></section>
        <section id="view-stock" class="view hidden"></section>
        <section id="view-inbound" class="view hidden"></section>
        <section id="view-outbound" class="view hidden"></section>
        <section id="view-adjust" class="view hidden"></section>
        <section id="view-history" class="view hidden"></section>
        <section id="view-alert" class="view hidden"></section>
      </main>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
